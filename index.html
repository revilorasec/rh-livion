<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1d4ed8">
<title>RH · Livion Solutions</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%231d4ed8'/%3E%3Ctext x='50' y='68' font-size='52' text-anchor='middle' fill='white' font-family='Arial' font-weight='bold'%3ERH%3C/text%3E%3C/svg%3E">
<style>
:root{
  --bg:#eef2f8; --card:#ffffff; --ink:#101a30; --mut:#5d6b85; --line:#e2e8f2;
  --brand:#1d4ed8; --brand-dark:#1e3fae; --brand-soft:#e4ecff;
  --ok:#15803d; --ok-soft:#dcf5e5; --warn:#b45309; --warn-soft:#fdeed4;
  --bad:#b91c1c; --bad-soft:#fde4e4; --info:#1d4ed8; --info-soft:#e4ecff;
  --gray-soft:#e9edf4;
  --r:16px; --shadow:0 1px 2px rgba(16,26,48,.06),0 8px 24px -12px rgba(16,26,48,.14);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;background:var(--bg);color:var(--ink);min-height:100dvh}
button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font:inherit;color:inherit}
a{color:var(--brand);text-decoration:none}
img{display:block}
.hide{display:none!important}

/* ---------- layout ---------- */
#shell{display:none;min-height:100dvh}
#shell.on{display:block}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:236px;background:#0f1c3f;color:#e6ecfb;display:flex;flex-direction:column;padding:20px 14px;z-index:30}
.sidebar .logo{display:flex;align-items:center;gap:10px;padding:2px 8px 18px;font-weight:800;font-size:1.05rem;letter-spacing:.2px}
.sidebar .logo .mark{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,#2f62ff,#1d4ed8);display:grid;place-items:center;font-size:.8rem;font-weight:800;color:#fff}
.sidebar .logo small{display:block;font-weight:500;color:#8da2cf;font-size:.7rem}
.snav{display:flex;flex-direction:column;gap:4px;margin-top:6px}
.snav button{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:11px;color:#b6c4e6;font-weight:600;font-size:.93rem;text-align:left}
.snav button svg{width:20px;height:20px;flex:none}
.snav button:hover{background:rgba(255,255,255,.07);color:#fff}
.snav button.on{background:var(--brand);color:#fff}
.sidebar .foot{margin-top:auto;padding:10px 8px;font-size:.78rem;color:#8da2cf;display:flex;align-items:center;gap:10px}
.sidebar .foot .uav{width:34px;height:34px;border-radius:50%;background:#2f62ff;display:grid;place-items:center;color:#fff;font-weight:700;font-size:.8rem;flex:none}
.sidebar .foot b{color:#e6ecfb;display:block;font-size:.82rem;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sidebar .foot button{color:#8da2cf;font-size:.75rem;padding:0;text-decoration:underline}
#main{padding:26px 30px 110px;max-width:1060px;margin:0 auto}
@media(min-width:861px){
  #main{margin-left:236px;max-width:none}
  .mtop,.bnav{display:none}
}
@media(max-width:860px){
  .sidebar{display:none}
  #main{padding:14px 14px 96px}
  .mtop{position:sticky;top:0;z-index:25;background:rgba(238,242,248,.92);backdrop-filter:blur(10px);display:flex;align-items:center;gap:10px;padding:12px 2px;margin:-14px -2px 8px}
  .mtop .mark{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,#2f62ff,#1d4ed8);display:grid;place-items:center;font-size:.72rem;font-weight:800;color:#fff}
  .mtop b{font-size:1rem}
  .mtop small{display:block;color:var(--mut);font-size:.7rem}
  .bnav{position:fixed;left:0;right:0;bottom:0;z-index:30;background:#fff;border-top:1px solid var(--line);display:flex;justify-content:space-around;padding:6px 4px calc(6px + env(safe-area-inset-bottom))}
  .bnav button{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:.64rem;font-weight:600;color:var(--mut);padding:4px 10px;border-radius:10px;min-width:58px}
  .bnav button svg{width:22px;height:22px}
  .bnav button.on{color:var(--brand)}
}

/* ---------- components ---------- */
.h1{font-size:1.35rem;font-weight:800;margin-bottom:2px}
.sub{color:var(--mut);font-size:.88rem;margin-bottom:18px}
.card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);padding:18px}
.grid{display:grid;gap:14px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px}
.stat{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);padding:14px 16px;cursor:pointer}
.stat .n{font-size:1.7rem;font-weight:800;line-height:1.1}
.stat .l{color:var(--mut);font-size:.78rem;font-weight:600;margin-top:2px}
.stat.accent .n{color:var(--brand)}
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:999px;font-size:.7rem;font-weight:700;white-space:nowrap}
.b-ok{background:var(--ok-soft);color:var(--ok)} .b-bad{background:var(--bad-soft);color:var(--bad)}
.b-warn{background:var(--warn-soft);color:var(--warn)} .b-info{background:var(--info-soft);color:var(--info)}
.b-gray{background:var(--gray-soft);color:var(--mut)}
.chips{display:flex;gap:8px;overflow-x:auto;padding:2px;margin-bottom:12px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex:none;padding:8px 15px;border-radius:999px;background:#fff;border:1px solid var(--line);font-size:.82rem;font-weight:600;color:var(--mut)}
.chip.on{background:var(--brand);border-color:var(--brand);color:#fff}
.search{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--line);border-radius:13px;padding:11px 14px;margin-bottom:12px;box-shadow:var(--shadow)}
.search input{flex:1;border:none;outline:none;background:none;font-size:.95rem}
.search svg{width:18px;height:18px;color:var(--mut);flex:none}
.plist{display:grid;gap:10px;grid-template-columns:repeat(auto-fill,minmax(290px,1fr))}
.pcard{display:flex;align-items:center;gap:13px;background:#fff;border-radius:var(--r);box-shadow:var(--shadow);padding:13px 15px;cursor:pointer;transition:transform .08s}
.pcard:active{transform:scale(.98)}
.av{border-radius:50%;background:var(--brand-soft);color:var(--brand);display:grid;place-items:center;font-weight:800;background-size:cover;background-position:center;flex:none}
.av.big{width:84px;height:84px;font-size:1.6rem}
.av.md{width:52px;height:52px;font-size:1.05rem}
.pcard .inf{flex:1;min-width:0}
.pcard .inf b{display:block;font-size:.95rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pcard .inf span{display:block;color:var(--mut);font-size:.78rem;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fab{position:fixed;right:20px;bottom:calc(84px + env(safe-area-inset-bottom));z-index:26;background:var(--brand);color:#fff;border-radius:999px;padding:15px 22px;font-weight:700;font-size:.9rem;box-shadow:0 10px 26px -8px rgba(29,78,216,.6);display:flex;align-items:center;gap:8px}
@media(min-width:861px){.fab{bottom:28px;right:34px}}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:10px 16px;border-radius:11px;font-weight:700;font-size:.85rem;background:var(--brand);color:#fff}
.btn:disabled{opacity:.5;cursor:default}
.btn.sec{background:var(--brand-soft);color:var(--brand)}
.btn.ghost{background:#fff;border:1px solid var(--line);color:var(--ink)}
.btn.danger{background:var(--bad-soft);color:var(--bad)}
.btn.sm{padding:7px 12px;font-size:.78rem;border-radius:9px}
.iconbtn{width:34px;height:34px;border-radius:9px;display:inline-grid;place-items:center;background:var(--gray-soft);color:var(--mut)}
.iconbtn svg{width:16px;height:16px}
.iconbtn:hover{background:var(--brand-soft);color:var(--brand)}

/* ficha */
.fichahead{display:flex;gap:18px;align-items:center;flex-wrap:wrap}
.fichahead .who{flex:1;min-width:200px}
.fichahead h2{font-size:1.3rem;font-weight:800;line-height:1.2}
.fichahead .role{color:var(--mut);font-size:.9rem;margin:3px 0 8px}
.avwrap{position:relative;flex:none}
.avwrap .cam{position:absolute;right:-2px;bottom:-2px;width:30px;height:30px;border-radius:50%;background:var(--brand);color:#fff;display:grid;place-items:center;border:3px solid #fff}
.avwrap .cam svg{width:14px;height:14px}
.quick{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-top:16px}
.quick .q{background:var(--bg);border-radius:12px;padding:10px 12px}
.quick .q small{display:block;color:var(--mut);font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.quick .q b{font-size:.9rem}
.tabs{display:flex;gap:4px;overflow-x:auto;margin:18px 0 12px;background:#fff;border-radius:13px;padding:5px;box-shadow:var(--shadow);scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tabs button{flex:1;white-space:nowrap;padding:9px 14px;border-radius:9px;font-weight:700;font-size:.82rem;color:var(--mut)}
.tabs button.on{background:var(--brand);color:#fff}
.dl{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:2px 18px}
.dl .it{padding:9px 2px;border-bottom:1px solid var(--line)}
.dl .it small{display:block;color:var(--mut);font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.dl .it span{font-size:.92rem}
.rowitem{display:flex;align-items:center;gap:12px;padding:12px 2px;border-bottom:1px solid var(--line)}
.rowitem:last-child{border-bottom:none}
.rowitem .inf{flex:1;min-width:0}
.rowitem .inf b{font-size:.92rem;display:block}
.rowitem .inf span{color:var(--mut);font-size:.78rem}
.secttl{display:flex;align-items:center;justify-content:space-between;margin:4px 0 8px}
.secttl h3{font-size:1rem;font-weight:800}
.bar{height:8px;border-radius:99px;background:var(--gray-soft);overflow:hidden;flex:1}
.bar i{display:block;height:100%;border-radius:99px;background:var(--brand)}
.distrow{display:flex;align-items:center;gap:10px;padding:6px 0;font-size:.83rem}
.distrow .lb{width:170px;flex:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600}
.distrow .vl{width:26px;text-align:right;color:var(--mut);font-weight:700;flex:none}
.empty{color:var(--mut);font-size:.88rem;text-align:center;padding:26px 10px}

/* table */
.tbl{width:100%;border-collapse:collapse;font-size:.87rem}
.tbl th{text-align:left;color:var(--mut);font-size:.7rem;text-transform:uppercase;letter-spacing:.4px;padding:8px 10px;border-bottom:2px solid var(--line)}
.tbl td{padding:10px;border-bottom:1px solid var(--line)}
.tbl tr:last-child td{border-bottom:none}

/* modal */
.overlay{position:fixed;inset:0;background:rgba(13,20,40,.5);z-index:50;display:grid;place-items:end center;backdrop-filter:blur(2px)}
@media(min-width:640px){.overlay{place-items:center}}
.modal{background:#fff;width:100%;max-width:560px;max-height:92dvh;overflow:auto;border-radius:22px 22px 0 0;padding:22px 20px calc(22px + env(safe-area-inset-bottom))}
@media(min-width:640px){.modal{border-radius:20px}}
.modal h3{font-size:1.1rem;font-weight:800;margin-bottom:16px}
.fgrid{display:grid;gap:12px;grid-template-columns:1fr 1fr}
.fgrid .full{grid-column:1/-1}
.fld label{display:block;font-size:.74rem;font-weight:700;color:var(--mut);margin-bottom:5px;text-transform:uppercase;letter-spacing:.3px}
.fld input,.fld select,.fld textarea{width:100%;border:1.5px solid var(--line);border-radius:11px;padding:11px 12px;font-size:.95rem;background:#fbfcfe;outline:none}
.fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--brand);background:#fff}
.fld textarea{min-height:76px;resize:vertical}
.modal .acts{display:flex;gap:10px;margin-top:20px}
.modal .acts .btn{flex:1;padding:13px}

/* toast / loading */
#toast{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(96px + env(safe-area-inset-bottom));z-index:80;background:#101a30;color:#fff;padding:12px 20px;border-radius:12px;font-size:.86rem;font-weight:600;box-shadow:var(--shadow);opacity:0;transition:opacity .2s;pointer-events:none;max-width:90vw;text-align:center}
@media(min-width:861px){#toast{bottom:30px}}
#toast.on{opacity:1}
#busy{position:fixed;inset:0;z-index:70;background:rgba(238,242,248,.7);display:none;place-items:center;backdrop-filter:blur(2px)}
#busy.on{display:grid}
.spin{width:44px;height:44px;border-radius:50%;border:4px solid var(--brand-soft);border-top-color:var(--brand);animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* login / setup */
.gate{min-height:100dvh;display:grid;place-items:center;padding:20px}
.gate .card{width:100%;max-width:420px;padding:34px 28px;text-align:center}
.gate .mark{width:66px;height:66px;border-radius:18px;background:linear-gradient(135deg,#2f62ff,#1d4ed8);display:grid;place-items:center;font-size:1.3rem;font-weight:800;color:#fff;margin:0 auto 16px}
.gate h1{font-size:1.3rem;margin-bottom:6px}
.gate p{color:var(--mut);font-size:.88rem;margin-bottom:22px}
.gate .fld{text-align:left;margin-bottom:12px}
.gate .btn{width:100%;padding:13px}
.gate .tip{margin-top:16px;font-size:.76rem;color:var(--mut)}
</style>
</head>
<body>
<div id="gate" class="gate"><div class="card"><div class="mark">RH</div><h1>Recursos Humanos</h1><p>Livion Solutions · carregando…</p><div class="spin" style="margin:0 auto"></div></div></div>
<div id="shell">
  <aside class="sidebar">
    <div class="logo"><div class="mark">RH</div><div>Recursos Humanos<small>Livion Solutions</small></div></div>
    <nav class="snav" id="snav"></nav>
    <div class="foot"><div class="uav" id="uav">·</div><div><b id="uname">—</b><button onclick="A.sair()">Sair</button></div></div>
  </aside>
  <div id="main"></div>
  <nav class="bnav" id="bnav"></nav>
</div>
<div id="toast"></div>
<div id="busy"><div class="spin"></div></div>
<input type="file" id="fileFoto" accept="image/*" class="hide">
<input type="file" id="fileGen" class="hide">
<script>
"use strict";
/* =====================================================================
   RH Livion — app único (HTML+JS) · dados no OneDrive via Microsoft Graph
   ===================================================================== */
window.addEventListener("error", ev=>{
  const g = document.getElementById("gate");
  if(g && !g.classList.contains("hide")){
    g.innerHTML = `<div class="card"><div class="mark">RH</div><h1>Erro no aplicativo</h1><p style="color:#b91c1c;word-break:break-word">${String(ev.message||ev.error||"desconhecido")}</p><p>Tire um print desta tela para suporte.</p><button class="btn" onclick="location.reload()">Recarregar</button></div>`;
  }
});
/* carrega bibliotecas com CDNs alternativos (resiliente a bloqueios) */
function loadScript(list){
  return new Promise((res,rej)=>{
    const next=()=>{
      if(!list.length) return rej(new Error("Não foi possível carregar uma biblioteca necessária. Verifique sua internet/firewall e recarregue a página."));
      const s=document.createElement("script");
      s.src=list.shift(); s.onload=()=>res(); s.onerror=next;
      document.head.appendChild(s);
    };
    next();
  });
}
const LIB_MSAL = loadScript([
  "https://alcdn.msauth.net/browser/2.38.3/js/msal-browser.min.js",
  "https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.4/lib/msal-browser.min.js",
  "https://unpkg.com/@azure/msal-browser@2.38.4/lib/msal-browser.min.js"
]);
LIB_MSAL.catch(()=>{});
let LIB_XLSX = null;
function ensureXlsx(){
  return LIB_XLSX || (LIB_XLSX = loadScript([
    "https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js",
    "https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js",
    "https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js"
  ]));
}
const ICONS = {
  home:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg>',
  team:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3.5"/><path d="M2.5 20c.8-3.2 3.4-5 6.5-5s5.7 1.8 6.5 5"/><circle cx="17.5" cy="9.5" r="2.5"/><path d="M16 15.2c2.6.3 4.6 1.8 5.5 4.8"/></svg>',

  cash:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2.5" y="6" width="19" height="12" rx="2"/><circle cx="12" cy="12" r="2.6"/><path d="M6 12h.01M18 12h.01"/></svg>',
  more:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="5" cy="12" r="1.6" fill="currentColor"/><circle cx="12" cy="12" r="1.6" fill="currentColor"/><circle cx="19" cy="12" r="1.6" fill="currentColor"/></svg>',

  edit:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20h4L19.5 8.5a2.1 2.1 0 0 0-3-3L5 17l-1 4Z"/></svg>',
  del:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 7h16M9 7V5h6v2m-8 0 1 13h8l1-13"/></svg>',
  doc:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3h8l4 4v14H6Z"/><path d="M14 3v4h4"/></svg>',
  open:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 4h6v6"/><path d="M20 4 11 13"/><path d="M19 14v5a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h5"/></svg>',
  back:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5l-7 7 7 7"/></svg>',
  plus:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>',
  cake:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 21h16M5 21v-6a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v6"/><path d="M12 9V6.5"/><path d="M12 4.5c.8-.8.4-2-.0-2.5-.4.5-.8 1.7 0 2.5Z"/><path d="M5 16c1.5 1.6 3 .1 4.5 0s3 1.6 4.5 0 3 .1 4.5 0"/></svg>',
  alert:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3 2.5 20h19L12 3Z"/><path d="M12 10v4m0 3h.01"/></svg>',
  link:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 14a5 5 0 0 0 7 0l3-3a5 5 0 0 0-7-7l-1.5 1.5"/><path d="M14 10a5 5 0 0 0-7 0l-3 3a5 5 0 0 0 7 7L12.5 18.5"/></svg>',

async function boot(){
  loadCfg();
  if(!cfg || !cfg.cid){ showSetup(); return; }
  try{
    if(typeof msal === "undefined") await LIB_MSAL;
    msalApp = new msal.PublicClientApplication({
      auth:{ clientId:cfg.cid, authority:"https://login.microsoftonline.com/"+cfg.tid, redirectUri:location.origin+location.pathname },
      cache:{ cacheLocation:"localStorage" }
    });
    const resp = await msalApp.handleRedirectPromise();
    if(resp && resp.account) msalApp.setActiveAccount(resp.account);
    account = msalApp.getActiveAccount() || msalApp.getAllAccounts()[0] || null;
    if(!account){ showLogin(); return; }
    msalApp.setActiveAccount(account);
    gate(`<div class="card"><div class="mark">RH</div><h1>Recursos Humanos</h1><p>Conectando ao OneDrive…</p><div class="spin" style="margin:0 auto"></div></div>`);
    await resolveFolder();
    await loadDB();
    startApp();
  }catch(e){
    console.error(e);
    if(String(e).includes("AADSTS")||String(e.errorCode||"").includes("invalid_client")) showSetup("Verifique os IDs informados.");
    else showFatal("Não foi possível conectar: "+esc(e.message||String(e)));
  }
}
async function token(){
  try{ return (await msalApp.acquireTokenSilent({scopes:SCOPES, account})).accessToken; }
  catch(e){ await msalApp.acquireTokenRedirect({scopes:SCOPES}); throw e; }
}
async function gfetch(path, opts={}, retry=true){
  const t = await token();
  const r = await fetch("https://graph.microsoft.com/v1.0"+path, {...opts, headers:{Authorization:"Bearer "+t, ...(opts.headers||{})}});
  if(r.status===429 && retry){ const w=+(r.headers.get("Retry-After")||2); await new Promise(s=>setTimeout(s,w*1000)); return gfetch(path,opts,false); }
  return r;
}
async function gjson(path, opts){ const r = await gfetch(path, opts); if(!r.ok){ const b=await r.text(); const err=new Error("Graph "+r.status+": "+b.slice(0,200)); err.status=r.status; throw err; } return r.status===204?null:r.json(); }
function encPath(rel){ return rel.split("/").map(encodeURIComponent).join("/"); }
function iPath(rel){ return `/drives/${FOLDER.driveId}/items/${FOLDER.id}` + (rel?`:/${encPath(rel)}:`:""); }

async function resolveFolder(){
  const j = await gjson(`/me/drive/root/children?$select=id,name,folder,remoteItem,parentReference&$top=999`);
  const hit = (j.value||[]).find(x=>x.name===cfg.folder);
  if(!hit){
    throw new Error(`A pasta “${cfg.folder}” não foi encontrada no seu OneDrive. Se ela foi compartilhada com você, abra o OneDrive, clique com o botão direito na pasta compartilhada e escolha “Adicionar atalho a Meus arquivos”.`);
  }
  FOLDER = hit.remoteItem
    ? { driveId: hit.remoteItem.parentReference.driveId, id: hit.remoteItem.id }
    : { driveId: hit.parentReference.driveId, id: hit.id };
}
async function loadDB(){
  const meta = await gjson(iPath("dados.json")+"?$select=eTag,id,@microsoft.graph.downloadUrl");
  dbEtag = meta.eTag;
  const r = await fetch(meta["@microsoft.graph.downloadUrl"]);
  rawSnapshot = await r.text();
  DB = JSON.parse(rawSnapshot);
}
async function saveDB(){
  busy(true);
  try{
    // backup diário (guarda o estado ANTES da primeira alteração do dia)
    const today = new Date().toISOString().slice(0,10);
    if(localStorage.getItem("rh_lastbk")!==today && rawSnapshot){
      try{ await gfetch(iPath(`Backup/dados_${today}.json`)+"/content", {method:"PUT", headers:{"Content-Type":"application/json"}, body:rawSnapshot}); localStorage.setItem("rh_lastbk",today); }catch(e){ console.warn("backup falhou",e); }
    }
    DB.meta.atualizadoEm = new Date().toISOString();
    DB.meta.atualizadoPor = account?.name || account?.username || "";
    const body = JSON.stringify(DB, null, 2);
    const r = await gfetch(iPath("dados.json")+"/content", {method:"PUT", headers:{"Content-Type":"application/json","If-Match":dbEtag}, body});
    if(r.status===412){
      toast("⚠️ Outra pessoa salvou alterações. Recarregando…");
      await loadDB(); render();
      return false;
    }
    if(!r.ok) throw new Error("Falha ao salvar ("+r.status+")");
    const j = await r.json(); dbEtag = j.eTag; rawSnapshot = body;
    return true;
  }catch(e){ toast("❌ "+(e.message||"Erro ao salvar")); return false; }
  finally{ busy(false); }
}
async function uploadFile(rel, blob, mime){
  if(blob.size < 3800000){
    const r = await gfetch(iPath(rel)+"/content", {method:"PUT", headers:{"Content-Type":mime||"application/octet-stream"}, body:blob});
    if(!r.ok) throw new Error("Upload falhou ("+r.status+")");
    return r.json();
  }
  const s = await gjson(iPath(rel)+"/createUploadSession", {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({item:{"@microsoft.graph.conflictBehavior":"rename"}})});
  const CH = 5*1024*1024; let pos = 0, last=null;
  while(pos < blob.size){
    const end = Math.min(pos+CH, blob.size);
    const r = await fetch(s.uploadUrl, {method:"PUT", headers:{"Content-Range":`bytes ${pos}-${end-1}/${blob.size}`}, body: blob.slice(pos,end)});
    if(!r.ok && r.status!==202) throw new Error("Upload falhou ("+r.status+")");
    last = r; pos = end;
  }
  return last.json();
}
async function fileUrl(rel){
  if(urlCache.has(rel)) return urlCache.get(rel);
  const j = await gjson(iPath(rel)+"?$select=webUrl");
  urlCache.set(rel, j.webUrl); return j.webUrl;
}
async function thumbUrl(rel){
  if(thumbCache.has(rel)) return thumbCache.get(rel);
  const p = (async()=>{
    try{ const j = await gjson(iPath(rel)+"/thumbnails?$select=medium"); return j.value?.[0]?.medium?.url||null; }
    catch(e){ return null; }
  })();
  thumbCache.set(rel, p); return p;
}
/* ---------------- utilidades ---------------- */
function esc(s){ return String(s??"").replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function nv(s){ return (s===null||s===undefined||s==="")?"—":esc(s); }
function fmtDate(iso){ if(!iso) return "—"; const [y,m,d]=String(iso).slice(0,10).split("-"); return (d&&m&&y)?`${d}/${m}/${y}`:esc(iso); }
function money(v){ return (v===null||v===undefined)?"—":Number(v).toLocaleString("pt-BR",{style:"currency",currency:"BRL"}); }
function initials(n){ return String(n||"?").trim().split(/\s+/).filter(Boolean).map(x=>x[0]).filter((_,i,a)=>i===0||i===a.length-1).join("").toUpperCase(); }
function idade(nasc){ if(!nasc) return null; const n=new Date(nasc+"T12:00"), h=new Date(); let a=h.getFullYear()-n.getFullYear(); const m=h.getMonth()-n.getMonth(); if(m<0||(m===0&&h.getDate()<n.getDate()))a--; return a; }
function tempoEmpresa(adm, dem){
  if(!adm) return null;
  const a=new Date(adm+"T12:00"), b=dem?new Date(dem+"T12:00"):new Date();
  let y=b.getFullYear()-a.getFullYear(), m=b.getMonth()-a.getMonth();
  if(b.getDate()<a.getDate()) m--;
  if(m<0){y--;m+=12}
  if(y<0) return null;
  const p=[]; if(y)p.push(y+(y>1?" anos":" ano")); if(m)p.push(m+(m>1?" meses":" mês"));
  return p.length?p.join(" e "):"menos de 1 mês";
}

function toast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("on"); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("on"),3200); }
function busy(on){ document.getElementById("busy").classList.toggle("on",!!on); }

}

/* ---------------- modal de formulário genérico ---------------- */
function openForm(title, fields, values, onSave){
  const ov = document.createElement("div"); ov.className="overlay";
  ov.innerHTML = `<div class="modal"><h3>${esc(title)}</h3><div class="fgrid">
    ${fields.map(f=>{
      const v = values[f.k] ?? "";
      let inp = "";
      if(f.type==="select") inp = `<select id="ff_${f.k}">${(f.opts||[]).map(o=>{const[val,lab]=Array.isArray(o)?o:[o,o];return `<option value="${esc(val)}" ${String(v)===String(val)?"selected":""}>${esc(lab)}</option>`;}).join("")}</select>`;
      else if(f.type==="textarea") inp = `<textarea id="ff_${f.k}">${esc(v)}</textarea>`;
      else if(f.type==="file") inp = `<input type="file" id="ff_${f.k}" ${f.accept?`accept="${f.accept}"`:""}>`;
      else inp = `<input type="${f.type||"text"}" id="ff_${f.k}" value="${esc(v)}" ${f.ph?`placeholder="${esc(f.ph)}"`:""}>`;
      return `<div class="fld ${f.full||f.type==="textarea"?"full":""}"><label>${esc(f.label)}${f.req?" *":""}</label>${inp}</div>`;
    }).join("")}
  </div><div class="acts"><button class="btn ghost" data-x>Cancelar</button><button class="btn" data-ok>Salvar</button></div></div>`;
  document.body.appendChild(ov);
  ov.addEventListener("click", e=>{ if(e.target===ov) ov.remove(); });
  ov.querySelector("[data-x]").onclick = ()=>ov.remove();
  ov.querySelector("[data-ok]").onclick = async ()=>{
    const out = {};
    for(const f of fields){
      const el = ov.querySelector("#ff_"+f.k);
      out[f.k] = f.type==="file" ? (el.files[0]||null) : (el.value.trim()||null);
      if(f.req && !out[f.k]){ toast("Preencha: "+f.label); return; }
    }
    ov.querySelector("[data-ok]").disabled = true;
    const ok = await onSave(out);
    if(ok!==false){ ov.remove(); render(); }
    else ov.querySelector("[data-ok]").disabled = false;
  };
}
function confirmar(msg, fn){
  const ov = document.createElement("div"); ov.className="overlay";
  ov.innerHTML = `<div class="modal"><h3>Confirmar</h3><p style="color:var(--mut);font-size:.92rem">${esc(msg)}</p>
  <div class="acts"><button class="btn ghost" data-x>Cancelar</button><button class="btn danger" data-ok>Excluir</button></div></div>`;
  document.body.appendChild(ov);
  ov.addEventListener("click", e=>{ if(e.target===ov) ov.remove(); });
  ov.querySelector("[data-x]").onclick = ()=>ov.remove();
  ov.querySelector("[data-ok]").onclick = async ()=>{ ov.remove(); await fn(); render(); };
}

/* --- foto (com redimensionamento) --- */
A.trocarFoto = id=>{
  const f=getF(id); const inp=document.getElementById("fileFoto"); inp.value="";
  inp.onchange = async ()=>{
    const file = inp.files[0]; if(!file) return;
    busy(true);
    try{
      const blob = await resizeImg(file, 1100, .86);
      const fn = `Foto_${new Date().toISOString().replace(/[:T]/g,"-").slice(0,19)}.jpg`;
      await uploadFile(`Funcionarios/${f.pasta}/Fotos/${fn}`, blob, "image/jpeg");
      f.foto = "Fotos/"+fn;
      thumbCache.clear();
      if(await saveDB()) toast("✅ Foto atualizada");
    }catch(e){ toast("❌ "+e.message); }
    busy(false); render();
  };
  inp.click();
};
function resizeImg(file, max, q){
  return new Promise((res,rej)=>{
    const img = new Image();
    img.onload = ()=>{
      let {width:w, height:h} = img;
      if(Math.max(w,h)>max){ const r=max/Math.max(w,h); w=Math.round(w*r); h=Math.round(h*r); }
      const c = document.createElement("canvas"); c.width=w; c.height=h;
      c.getContext("2d").drawImage(img,0,0,w,h);
      c.toBlob(b=>b?res(b):rej(new Error("Falha ao processar imagem")), "image/jpeg", q);
    };
    img.onerror = ()=>rej(new Error("Imagem inválida"));
    img.src = URL.createObjectURL(file);
  });
}

A.exportar = async ()=>{
  try{
    busy(true);
    if(typeof XLSX === "undefined") await ensureXlsx();
    busy(false);
    const wb = XLSX.utils.book_new();
    const add = (nome, rows)=> XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(rows), nome);
    add("Funcionarios", DB.funcionarios.map(f=>({ID:f.id, Nome:f.nome, Status:f.status, Empresa:f.empresa, Cargo:f.cargo, "Nível":f.nivel, "Admissão":f.dataAdmissao, "Desligamento":f.dataDemissao, "Tempo de empresa":tempoEmpresa(f.dataAdmissao,f.dataDemissao), "Salário (tabela)":salarioDe(f), LinkedIn:f.linkedin, "Telefone":f.pessoal.telefonePessoal, "E-mail":f.pessoal.emailProfissional||f.pessoal.emailPessoal, CPF:f.pessoal.cpf, RG:f.pessoal.rg, Nascimento:f.pessoal.nascimento, "Endereço":f.pessoal.endereco, "Estado civil":f.pessoal.estadoCivil, "Contato emergência":f.pessoal.emergenciaNome, "Tel. emergência":f.pessoal.emergenciaTelefone, "Tipo sanguíneo":f.pessoal.tipoSanguineo, "Avaliação":f.avaliacao, "Observações":f.observacoes })));
    add("Bancos", DB.funcionarios.flatMap(f=>f.bancos.map(b=>({Funcionario:f.nome, Banco:b.banco, "Agência":b.agencia, Conta:b.conta, "Tipo PIX":b.tipoPix, "Chave PIX":b.chavePix, "Obs":b.observacoes}))));
    add("Documentos", DB.funcionarios.flatMap(f=>f.documentos.map(d=>({Funcionario:f.nome, Tipo:d.tipo, "Emissão":d.emissao, Validade:d.validade, Arquivo:d.arquivo, Obs:d.observacoes}))));
    add("Clientes", DB.clientes.map(c=>({Nome:c.nome, "Empresa contratada":c.empresaContratada, CNPJ:c.cnpj, UF:c.uf, Cidade:c.cidade, Contato:c.contato, Telefone:c.telefone, Email:c.email})));
    add("Projetos", DB.projetos.map(p=>({Projeto:p.nome, Cliente:getCli(p.clienteId)?.nome, Status:p.status, "Início":p.inicio, "Término":p.fim, "Descrição":p.descricao})));
    add("Alocações", DB.funcionarios.flatMap(f=>f.projetos.map(a=>({Funcionario:f.nome, Projeto:getProj(a.projetoId)?.nome, "Função":a.funcao||a.cargo, "Início":a.inicio, "Saída":a.fim}))));
    add("Cargos", DB.cargos.map(c=>({Cargo:c.cargo, "Nível":c.nivel, "Salário":c.salario, "% Aumento":c.aumento, "Carga horária":c.cargaHoraria, Obs:c.observacao})));
    XLSX.writeFile(wb, `RH Livion ${new Date().toISOString().slice(0,10)}.xlsx`);
    toast("✅ Planilha gerada");
  }catch(e){ busy(false); toast("❌ "+e.message); }
};
