<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1b3a6b">
<title>RH · Livion Solutions</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%231d4ed8'/%3E%3Ctext x='50' y='68' font-size='52' text-anchor='middle' fill='white' font-family='Arial' font-weight='bold'%3ERH%3C/text%3E%3C/svg%3E">
<style>
:root{
  --bg:#f5f7fc; --card:#ffffff; --ink:#0f172a; --mut:#64748b; --line:#e2e8f0;
  --brand:#1b3a6b; --brand-dark:#132a4d; --brand-soft:#e8eef8;
  --cyan:#0284c7; --cyan-soft:#e0f2fe;
  --gold:#f59e0b; --gold-soft:#fef3c7;
  --ok:#059669; --ok-soft:#dcfce7; --warn:#d97706; --warn-soft:#fed7aa;
  --bad:#dc2626; --bad-soft:#fee2e2; --info:#1b3a6b; --info-soft:#e8eef8;
  --gray-soft:#f1f5f9;
  --r:12px; --shadow:0 1px 3px rgba(0,0,0,.08),0 4px 12px rgba(0,0,0,.12);
  --shadow-lg:0 10px 30px rgba(0,0,0,.15);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;background:var(--bg);color:var(--ink);min-height:100dvh;line-height:1.6}
button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font:inherit;color:inherit}
a{color:var(--brand);text-decoration:none}
img{display:block}
.hide{display:none!important}

#shell{display:none;min-height:100dvh}
#shell.on{display:block}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:240px;background:#1e2a42;color:#ffffff;display:flex;flex-direction:column;padding:24px 16px;z-index:30}
.sidebar .logo{display:flex;flex-direction:column;align-items:center;text-align:center;gap:12px;padding:8px 0 20px;font-weight:800;font-size:1.05rem;letter-spacing:.3px}
.sidebar .logo .mark{width:100%;height:72px;border-radius:12px;background:linear-gradient(135deg,#0284c7 0%,#1b3a6b 100%);display:grid;place-items:center;font-size:1.1rem;font-weight:800;color:#fff;box-shadow:0 4px 12px rgba(2,132,199,.3)}
.sidebar .logo small{display:block;font-weight:500;color:#b0b8c8;font-size:.7rem;margin-top:2px}
.snav{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.snav button{display:flex;align-items:center;gap:14px;padding:12px 14px;border-radius:10px;color:#ffffff;font-weight:600;font-size:.92rem;text-align:left;transition:all .2s}
.snav button svg{width:20px;height:20px;flex:none}
.snav button:hover{background:rgba(255,255,255,.15);color:#fff}
.snav button.on{background:#0284c7;color:#fff;box-shadow:0 4px 12px rgba(2,132,199,.3)}
.sidebar .foot{margin-top:auto;padding:12px 8px;font-size:.78rem;color:#b0b8c8;display:flex;align-items:center;gap:12px}
.sidebar .foot .uav{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#0284c7,#1b3a6b);display:grid;place-items:center;color:#fff;font-weight:700;font-size:.8rem;flex:none}
.sidebar .foot b{color:#ffffff;display:block;font-size:.8rem;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sidebar .foot button{color:#b0b8c8;font-size:.75rem;padding:0;text-decoration:underline;transition:.2s;background:none;border:none;cursor:pointer}
.sidebar .foot button:hover{color:#ffffff}
.vmark{position:fixed;left:16px;bottom:8px;z-index:31;background:#0284c7;color:#fff;font-size:.62rem;font-weight:700;padding:3px 8px;border-radius:6px;letter-spacing:.5px}
@media(max-width:860px){.vmark{display:none}}

#main{padding:28px 32px 120px;max-width:1280px;margin:0 auto}
@media(min-width:861px){
  #main{margin-left:240px;max-width:none}
  .mtop,.bnav{display:none}
}
@media(max-width:860px){
  .sidebar{display:none}
  #main{padding:14px 16px 100px}
  .mtop{position:sticky;top:0;z-index:25;background:rgba(245,247,252,.95);backdrop-filter:blur(10px);display:flex;align-items:center;gap:10px;padding:12px 2px;margin:-14px -2px 8px}
  .mtop .mark{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,#0284c7,#1b3a6b);display:grid;place-items:center;font-size:.75rem;font-weight:800;color:#fff}
  .mtop b{font-size:1rem;font-weight:700}
  .mtop small{display:block;color:var(--mut);font-size:.7rem}
  .bnav{position:fixed;left:0;right:0;bottom:0;z-index:30;background:#fff;border-top:1px solid var(--line);display:flex;justify-content:space-around;padding:8px 4px calc(8px + env(safe-area-inset-bottom));box-shadow:0 -2px 8px rgba(0,0,0,.06)}
  .bnav button{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:.6rem;font-weight:600;color:var(--mut);padding:6px 5px;border-radius:10px;min-width:44px;transition:.2s}
  .bnav button svg{width:22px;height:22px}
  .bnav button.on{color:var(--brand)}
}

.h1{font-size:1.4rem;font-weight:800;margin-bottom:4px;color:var(--ink)}
.sub{color:var(--mut);font-size:.9rem;margin-bottom:20px;line-height:1.5}
.card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);padding:20px}
.card.elevated{box-shadow:var(--shadow-lg)}
.grid{display:grid;gap:16px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:20px}
.stat{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);padding:18px;transition:all .2s;border-left:4px solid var(--line)}
.stat:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.stat.accent{border-left-color:var(--brand)}
.stat.success{border-left-color:var(--ok)}
.stat.warning{border-left-color:var(--warn)}
.stat .n{font-size:1.9rem;font-weight:800;line-height:1;color:var(--ink);margin-bottom:8px}
.stat.accent .n{color:var(--brand)}
.stat.success .n{color:var(--ok)}
.stat.warning .n{color:var(--warn)}
.stat .l{color:var(--mut);font-size:.8rem;font-weight:600;text-transform:uppercase;letter-spacing:.3px}

.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:6px;font-size:.72rem;font-weight:700;white-space:nowrap}
.b-ok{background:var(--ok-soft);color:var(--ok)}.b-bad{background:var(--bad-soft);color:var(--bad)}
.b-warn{background:var(--warn-soft);color:var(--warn)}.b-info{background:var(--info-soft);color:var(--info)}
.b-gray{background:var(--gray-soft);color:var(--mut)}

.chips{display:flex;gap:10px;overflow-x:auto;padding:2px;margin-bottom:14px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex:none;padding:9px 18px;border-radius:8px;background:#fff;border:1.5px solid var(--line);font-size:.83rem;font-weight:600;color:var(--mut);cursor:pointer;transition:all .2s}
.chip:hover{border-color:var(--brand);color:var(--brand)}
.chip.on{background:var(--brand);border-color:var(--brand);color:#fff}

.search{display:flex;align-items:center;gap:12px;background:#fff;border:1.5px solid var(--line);border-radius:12px;padding:12px 16px;margin-bottom:14px;box-shadow:var(--shadow);transition:border-color .2s}
.search:focus-within{border-color:var(--brand);box-shadow:var(--shadow-lg)}
.search input{flex:1;border:none;outline:none;background:none;font-size:.95rem;color:var(--ink)}
.search input::placeholder{color:var(--mut)}
.search svg{width:18px;height:18px;color:var(--mut);flex:none}

.plist{display:grid;gap:12px;grid-template-columns:repeat(auto-fill,minmax(300px,1fr))}
.pcard{display:flex;align-items:center;gap:14px;background:#fff;border-radius:var(--r);box-shadow:var(--shadow);padding:16px;cursor:pointer;transition:all .2s;border:1px solid transparent}
.pcard:hover{border-color:var(--brand);box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.pcard:active{transform:scale(.98)}

.av{border-radius:50%;background:var(--brand-soft);color:var(--brand);display:grid;place-items:center;font-weight:800;background-size:cover;background-position:center;flex:none;font-size:.9rem}
.av.big{width:88px;height:88px;font-size:1.7rem}
.av.md{width:54px;height:54px;font-size:1.1rem}
.pcard .inf{flex:1;min-width:0}
.pcard .inf b{display:block;font-size:.95rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:700}
.pcard .inf span{display:block;color:var(--mut);font-size:.8rem;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.fab{position:fixed;right:22px;bottom:calc(90px + env(safe-area-inset-bottom));z-index:26;background:linear-gradient(135deg,var(--brand),var(--cyan));color:#fff;border-radius:12px;padding:16px 24px;font-weight:700;font-size:.92rem;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:10px;transition:all .2s}
.fab:hover{transform:translateY(-3px);box-shadow:0 12px 36px rgba(27,58,107,.3)}
@media(min-width:861px){.fab{bottom:30px;border-radius:999px}}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 18px;border-radius:10px;font-weight:700;font-size:.87rem;background:var(--brand);color:#fff;transition:all .2s;border:1px solid transparent}
.btn:hover{background:var(--brand-dark);transform:translateY(-1px);box-shadow:0 4px 12px rgba(27,58,107,.3)}
.btn:active{transform:translateY(0);box-shadow:none}
.btn:disabled{opacity:.5;cursor:default;transform:none}
.btn.sec{background:var(--brand-soft);color:var(--brand);border:1px solid var(--brand-soft)}
.btn.sec:hover{background:var(--brand);color:#fff;border-color:var(--brand)}
.btn.ghost{background:transparent;border:1.5px solid var(--line);color:var(--ink)}
.btn.ghost:hover{border-color:var(--brand);color:var(--brand);background:var(--brand-soft)}
.btn.danger{background:var(--bad-soft);color:var(--bad);border:1px solid var(--bad-soft)}
.btn.danger:hover{background:var(--bad);color:#fff;border-color:var(--bad)}
.btn.sm{padding:8px 14px;font-size:.8rem;border-radius:8px}

.iconbtn{width:36px;height:36px;border-radius:8px;display:inline-grid;place-items:center;background:transparent;color:var(--mut);transition:all .2s;border:1px solid transparent}
.iconbtn svg{width:18px;height:18px}
.iconbtn:hover{background:var(--gray-soft);color:var(--brand);border-color:var(--line)}

.rowitem>svg{width:22px;height:22px;flex:none;color:var(--brand)}
.check{display:flex;align-items:center;gap:10px;padding:10px 6px;border-bottom:1px solid var(--line);font-size:.9rem;cursor:pointer}
.check input{width:18px;height:18px;accent-color:var(--brand);flex:none;cursor:pointer}
.colpick{display:flex;flex-wrap:wrap;gap:10px}
.colpick label{cursor:pointer;display:inline-flex;gap:8px;align-items:center;font-size:.9rem}
.colpick input{accent-color:var(--brand);cursor:pointer}
.viewtog{display:flex;gap:4px;background:#fff;border:1.5px solid var(--line);border-radius:9px;padding:3px}
.viewtog button{padding:7px 12px;border-radius:7px;color:var(--mut);font-weight:700;font-size:.78rem;transition:.2s}
.viewtog button:hover{color:var(--brand)}
.viewtog button.on{background:var(--brand);color:#fff}

.selrow{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.selrow select{border:1.5px solid var(--line);border-radius:9px;padding:9px 12px;background:#fff;font-size:.85rem;color:var(--ink);cursor:pointer;transition:border-color .2s;max-width:46vw}
.selrow select:focus{outline:none;border-color:var(--brand)}
.lrow{display:flex;align-items:center;gap:10px;background:#fff;border-radius:12px;box-shadow:var(--shadow);padding:10px 14px;cursor:pointer;transition:.2s}
.lrow:hover{box-shadow:var(--shadow-lg)}

.fichahead{display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap}
.fichahead .who{flex:1;min-width:200px}
.fichahead h2{font-size:1.4rem;font-weight:800;line-height:1.2;color:var(--ink)}
.fichahead .role{color:var(--mut);font-size:.95rem;margin:6px 0 10px;font-weight:500}
.avwrap{position:relative;flex:none}
.avwrap .cam{position:absolute;right:-3px;bottom:-3px;width:32px;height:32px;border-radius:50%;background:var(--brand);color:#fff;display:grid;place-items:center;border:3px solid #fff;box-shadow:0 2px 8px rgba(27,58,107,.3);cursor:pointer;transition:.2s}
.avwrap .cam:hover{transform:scale(1.1)}
.avwrap .cam svg{width:16px;height:16px}

.quick{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-top:18px}
.quick .q{background:var(--gray-soft);border-radius:10px;padding:12px 14px;border-left:3px solid var(--brand)}
.quick .q small{display:block;color:var(--mut);font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.quick .q b{font-size:.95rem;color:var(--ink);font-weight:700}

.tabs{display:flex;gap:6px;overflow-x:auto;margin:20px 0 14px;background:#fff;border-radius:11px;padding:6px;box-shadow:var(--shadow);scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tabs button{flex:1;white-space:nowrap;padding:10px 16px;border-radius:8px;font-weight:700;font-size:.84rem;color:var(--mut);transition:all .2s;min-width:fit-content}
.tabs button:hover{color:var(--brand)}
.tabs button.on{background:var(--brand);color:#fff}

.dl{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:4px 20px}
.dl .it{padding:11px 0;border-bottom:1px solid var(--line)}
.dl .it small{display:block;color:var(--mut);font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.dl .it span{font-size:.95rem;color:var(--ink);font-weight:500}

.rowitem{display:flex;align-items:center;gap:13px;padding:13px 0;border-bottom:1px solid var(--line)}
.rowitem:last-child{border-bottom:none}
.rowitem .inf{flex:1;min-width:0}
.rowitem .inf b{font-size:.95rem;display:block;font-weight:700;color:var(--ink)}
.rowitem .inf span{color:var(--mut);font-size:.8rem;margin-top:2px}

.secttl{display:flex;align-items:center;justify-content:space-between;margin:6px 0 12px}
.secttl h3{font-size:1.02rem;font-weight:800;color:var(--ink)}
.bar{height:8px;border-radius:999px;background:var(--gray-soft);overflow:hidden;flex:1;box-shadow:inset 0 1px 2px rgba(0,0,0,.05)}
.bar i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--brand),var(--cyan));box-shadow:0 1px 2px rgba(27,58,107,.3)}
.distrow{display:flex;align-items:center;gap:12px;padding:8px 0;font-size:.85rem}
.distrow .lb{width:170px;flex:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600;color:var(--ink)}
.distrow .vl{width:30px;text-align:right;color:var(--mut);font-weight:700;flex:none}
.empty{color:var(--mut);font-size:.9rem;text-align:center;padding:28px 12px;background:var(--gray-soft);border-radius:10px}

.tbl{width:100%;border-collapse:collapse;font-size:.87rem}
.tbl thead{background:var(--gray-soft)}
.tbl th{text-align:left;color:var(--mut);font-size:.72rem;text-transform:uppercase;letter-spacing:.4px;padding:12px 12px;border-bottom:2px solid var(--line);font-weight:700}
.tbl td{padding:12px;border-bottom:1px solid var(--line);color:var(--ink)}
.tbl tbody tr:hover{background:var(--gray-soft)}
.tbl tr:last-child td{border-bottom:none}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50;display:grid;place-items:end center;backdrop-filter:blur(4px)}
@media(min-width:640px){.overlay{place-items:center}}
.modal{background:#fff;width:100%;max-width:580px;max-height:92dvh;overflow:auto;border-radius:20px 20px 0 0;padding:24px 22px calc(24px + env(safe-area-inset-bottom))}
@media(min-width:640px){.modal{border-radius:16px}}
.modal h3{font-size:1.15rem;font-weight:800;margin-bottom:18px;color:var(--ink)}
.fgrid{display:grid;gap:14px;grid-template-columns:1fr 1fr}
.fgrid .full{grid-column:1/-1}
.fld label{display:block;font-size:.76rem;font-weight:700;color:var(--mut);margin-bottom:6px;text-transform:uppercase;letter-spacing:.3px}
.fld input,.fld select,.fld textarea{width:100%;border:1.5px solid var(--line);border-radius:10px;padding:12px 14px;font-size:.95rem;background:#f8fafc;outline:none;transition:all .2s;color:var(--ink)}
.fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--brand);background:#fff;box-shadow:0 0 0 3px var(--brand-soft)}
.fld textarea{min-height:80px;resize:vertical}
.modal .acts{display:flex;gap:10px;margin-top:22px}
.modal .acts .btn{flex:1;padding:13px}

#toast{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(100px + env(safe-area-inset-bottom));z-index:80;background:#0f172a;color:#fff;padding:13px 22px;border-radius:10px;font-size:.87rem;font-weight:600;box-shadow:var(--shadow-lg);opacity:0;transition:opacity .2s;pointer-events:none;max-width:90vw;text-align:center}
@media(min-width:861px){#toast{bottom:32px}}
#toast.on{opacity:1}
#busy{position:fixed;inset:0;z-index:70;background:rgba(245,247,252,.85);display:none;place-items:center;backdrop-filter:blur(3px)}
#busy.on{display:grid}
.spin{width:48px;height:48px;border-radius:50%;border:4px solid var(--brand-soft);border-top-color:var(--brand);animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

.gate{min-height:100dvh;display:grid;place-items:center;padding:20px;background:linear-gradient(135deg,var(--bg) 0%,var(--brand-soft) 100%)}
.gate .card{width:100%;max-width:440px;padding:36px 32px;text-align:center;box-shadow:var(--shadow-lg)}
.gate .mark{width:100%;max-width:240px;height:100px;border-radius:14px;background:linear-gradient(135deg,#0284c7 0%,#1b3a6b 100%);display:grid;place-items:center;font-size:1.6rem;font-weight:800;color:#fff;margin:0 auto 20px;box-shadow:0 6px 20px rgba(27,58,107,.3)}
.gate h1{font-size:1.35rem;margin-bottom:8px;color:var(--ink);font-weight:800}
.gate p{color:var(--mut);font-size:.9rem;margin-bottom:24px;line-height:1.6}
.gate .fld{text-align:left;margin-bottom:14px}
.gate .btn{width:100%;padding:13px;margin-bottom:8px}
.gate .tip{margin-top:18px;font-size:.78rem;color:var(--mut)}

</style>
</head>
<body>
<div id="gate" class="gate"><div class="card"><div class="mark">RH</div><h1>Recursos Humanos</h1><p>Livion Solutions · carregando…</p><div class="spin" style="margin:0 auto"></div></div></div>
<div id="shell"><div class="vmark">DESIGN V2</div>
  <aside class="sidebar">
    <div class="logo"><div class="mark">RH</div><div>Recursos Humanos<small>Livion Solutions</small></div></div>
    <nav class="snav" id="snav"></nav>
    <div class="foot"><div class="uav" id="uav">·</div><div><b id="uname">—</b><button onclick="A.sair()">Sair</button></div></div>
  </aside>
  <div id="main"></div>
  <nav class="bnav" id="bnav"></nav>
</div>
<div id="toast"></div>
<div id="busy"><div class="spin"></div></div>
<input type="file" id="fileFoto" accept="image/*" class="hide">
<input type="file" id="fileGen" class="hide">
<script>
"use strict";
/* =====================================================================
   RH Livion — app único (HTML+JS) · dados no OneDrive via Microsoft Graph
   ===================================================================== */
window.addEventListener("error", ev=>{
  const g = document.getElementById("gate");
  if(g && !g.classList.contains("hide")){
    g.innerHTML = `<div class="card"><div class="mark">RH</div><h1>Erro no aplicativo</h1><p style="color:#b91c1c;word-break:break-word">${String(ev.message||ev.error||"desconhecido")}</p><p>Tire um print desta tela para suporte.</p><button class="btn" onclick="location.reload()">Recarregar</button></div>`;
  }
});
/* carrega bibliotecas com CDNs alternativos (resiliente a bloqueios) */
function loadScript(list){
  return new Promise((res,rej)=>{
    const next=()=>{
      if(!list.length) return rej(new Error("Não foi possível carregar uma biblioteca necessária. Verifique sua internet/firewall e recarregue a página."));
      const s=document.createElement("script");
      s.src=list.shift(); s.onload=()=>res(); s.onerror=next;
      document.head.appendChild(s);
    };
    next();
  });
}
const LIB_MSAL = loadScript([
  "https://alcdn.msauth.net/browser/2.38.3/js/msal-browser.min.js",
  "https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.4/lib/msal-browser.min.js",
  "https://unpkg.com/@azure/msal-browser@2.38.4/lib/msal-browser.min.js"
]);
LIB_MSAL.catch(()=>{});
let LIB_XLSX = null;
function ensureXlsx(){
  return LIB_XLSX || (LIB_XLSX = loadScript([
    "https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js",
    "https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js",
    "https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js"
  ]));

const SCOPES = ["User.Read","Files.ReadWrite.All"];

function loadCfg(){

}

async function boot(){
  loadCfg();
  if(!cfg || !cfg.cid){ showSetup(); return; }
  try{
    if(typeof msal === "undefined") await LIB_MSAL;
    msalApp = new msal.PublicClientApplication({
      auth:{ clientId:cfg.cid, authority:"https://login.microsoftonline.com/"+cfg.tid, redirectUri:location.origin+location.pathname },
      cache:{ cacheLocation:"localStorage" }
    });
    const resp = await msalApp.handleRedirectPromise();
    if(resp && resp.account) msalApp.setActiveAccount(resp.account);
    account = msalApp.getActiveAccount() || msalApp.getAllAccounts()[0] || null;
    if(!account){ showLogin(); return; }
    msalApp.setActiveAccount(account);
    gate(`<div class="card"><div class="mark">RH</div><h1>Recursos Humanos</h1><p>Conectando ao OneDrive…</p><div class="spin" style="margin:0 auto"></div></div>`);
    await resolveFolder();
    await loadDB();
    startApp();
  }catch(e){
    console.error(e);
    if(String(e).includes("AADSTS")||String(e.errorCode||"").includes("invalid_client")) showSetup("Verifique os IDs informados.");
    else showFatal("Não foi possível conectar: "+esc(e.message||String(e)));
  }
}
async function token(){
  try{ return (await msalApp.acquireTokenSilent({scopes:SCOPES, account})).accessToken; }
  catch(e){ await msalApp.acquireTokenRedirect({scopes:SCOPES}); throw e; }
}
async function gfetch(path, opts={}, retry=true){
  const t = await token();
  const r = await fetch("https://graph.microsoft.com/v1.0"+path, {...opts, headers:{Authorization:"Bearer "+t, ...(opts.headers||{})}});
  if(r.status===429 && retry){ const w=+(r.headers.get("Retry-After")||2); await new Promise(s=>setTimeout(s,w*1000)); return gfetch(path,opts,false); }
  return r;
}
async function gjson(path, opts){ const r = await gfetch(path, opts); if(!r.ok){ const b=await r.text(); const err=new Error("Graph "+r.status+": "+b.slice(0,200)); err.status=r.status; throw err; } return r.status===204?null:r.json(); }
function encPath(rel){ return rel.split("/").map(encodeURIComponent).join("/"); }
function iPath(rel){ return `/drives/${FOLDER.driveId}/items/${FOLDER.id}` + (rel?`:/${encPath(rel)}:`:""); }

async function resolveFolder(){
  const j = await gjson(`/me/drive/root/children?$select=id,name,folder,remoteItem,parentReference&$top=999`);
  const hit = (j.value||[]).find(x=>x.name===cfg.folder);
  if(!hit){
    throw new Error(`A pasta “${cfg.folder}” não foi encontrada no seu OneDrive. Se ela foi compartilhada com você, abra o OneDrive, clique com o botão direito na pasta compartilhada e escolha “Adicionar atalho a Meus arquivos”.`);
  }
  FOLDER = hit.remoteItem
    ? { driveId: hit.remoteItem.parentReference.driveId, id: hit.remoteItem.id }
    : { driveId: hit.parentReference.driveId, id: hit.id };
}
async function loadDB(){
  const meta = await gjson(iPath("dados.json")+"?$select=eTag,id");
  dbEtag = meta.eTag;
  const r = await gfetch(iPath("dados.json")+"/content");
  if(!r.ok) throw new Error("Não foi possível ler o dados.json na pasta do OneDrive ("+r.status+").");
  rawSnapshot = await r.text();
  try{ DB = JSON.parse(rawSnapshot); }
  catch(e){ throw new Error("O arquivo dados.json existe mas não é um JSON válido. Restaure o backup da pasta Backup."); }
  normalizeDB();
}
async function saveDB(){
  busy(true);
  try{
    // backup diário (guarda o estado ANTES da primeira alteração do dia)
    const today = new Date().toISOString().slice(0,10);
    if(localStorage.getItem("rh_lastbk")!==today && rawSnapshot){
      try{ await gfetch(iPath(`Backup/dados_${today}.json`)+"/content", {method:"PUT", headers:{"Content-Type":"application/json"}, body:rawSnapshot}); localStorage.setItem("rh_lastbk",today); }catch(e){ console.warn("backup falhou",e); }
    }
    DB.meta.atualizadoEm = new Date().toISOString();
    DB.meta.atualizadoPor = account?.name || account?.username || "";
    const body = JSON.stringify(DB, null, 2);
    const r = await gfetch(iPath("dados.json")+"/content", {method:"PUT", headers:{"Content-Type":"application/json","If-Match":dbEtag}, body});
    if(r.status===412){
      toast("⚠️ Outra pessoa salvou alterações. Recarregando…");
      await loadDB(); render();
      return false;
    }
    if(!r.ok) throw new Error("Falha ao salvar ("+r.status+")");
    const j = await r.json(); dbEtag = j.eTag; rawSnapshot = body;
    return true;
  }catch(e){ toast("❌ "+(e.message||"Erro ao salvar")); return false; }
  finally{ busy(false); }
}
async function uploadFile(rel, blob, mime){
  if(blob.size < 3800000){
    const r = await gfetch(iPath(rel)+"/content", {method:"PUT", headers:{"Content-Type":mime||"application/octet-stream"}, body:blob});
    if(!r.ok) throw new Error("Upload falhou ("+r.status+")");
    return r.json();
  }
  const s = await gjson(iPath(rel)+"/createUploadSession", {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({item:{"@microsoft.graph.conflictBehavior":"rename"}})});
  const CH = 5*1024*1024; let pos = 0, last=null;
  while(pos < blob.size){
    const end = Math.min(pos+CH, blob.size);
    const r = await fetch(s.uploadUrl, {method:"PUT", headers:{"Content-Range":`bytes ${pos}-${end-1}/${blob.size}`}, body: blob.slice(pos,end)});
    if(!r.ok && r.status!==202) throw new Error("Upload falhou ("+r.status+")");
    last = r; pos = end;
  }
  return last.json();
}
async function fileUrl(rel){
  if(urlCache.has(rel)) return urlCache.get(rel);
  const j = await gjson(iPath(rel)+"?$select=webUrl");
  urlCache.set(rel, j.webUrl); return j.webUrl;
}
async function thumbUrl(rel){
  if(thumbCache.has(rel)) return thumbCache.get(rel);
  const p = (async()=>{
    try{ const j = await gjson(iPath(rel)+"/thumbnails?$select=medium"); return j.value?.[0]?.medium?.url||null; }
    catch(e){ return null; }
  })();
  thumbCache.set(rel, p); return p;
}
/* ---------------- utilidades ---------------- */
function esc(s){ return String(s??"").replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function nv(s){ return (s===null||s===undefined||s==="")?"—":esc(s); }
function fmtDate(iso){ if(!iso) return "—"; const [y,m,d]=String(iso).slice(0,10).split("-"); return (d&&m&&y)?`${d}/${m}/${y}`:esc(iso); }
function money(v){ return (v===null||v===undefined)?"—":Number(v).toLocaleString("pt-BR",{style:"currency",currency:"BRL"}); }
function initials(n){ return String(n||"?").trim().split(/\s+/).filter(Boolean).map(x=>x[0]).filter((_,i,a)=>i===0||i===a.length-1).join("").toUpperCase(); }
function idade(nasc){ if(!nasc) return null; const n=new Date(nasc+"T12:00"), h=new Date(); let a=h.getFullYear()-n.getFullYear(); const m=h.getMonth()-n.getMonth(); if(m<0||(m===0&&h.getDate()<n.getDate()))a--; return a; }
function tempoEmpresa(adm, dem){
  if(!adm) return null;
  const a=new Date(adm+"T12:00"), b=dem?new Date(dem+"T12:00"):new Date();
  let y=b.getFullYear()-a.getFullYear(), m=b.getMonth()-a.getMonth();
  if(b.getDate()<a.getDate()) m--;
  if(m<0){y--;m+=12}
  if(y<0) return null;
  const p=[]; if(y)p.push(y+(y>1?" anos":" ano")); if(m)p.push(m+(m>1?" meses":" mês"));
  return p.length?p.join(" e "):"menos de 1 mês";
}

function toast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("on"); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("on"),3200); }
function busy(on){ document.getElementById("busy").classList.toggle("on",!!on); }
function uid(){ return Math.random().toString(16).slice(2,10); }

function safeName(s){ return String(s||"").replace(/[<>:"/\\|?*]/g,"").replace(/\s+/g," ").trim(); }
function fmtMask(v, kind){
  const d = String(v||"").replace(/\D/g,"");
  const m = kind==="cpf" ? "000.000.000-00"
        : kind==="cnpj" ? "00.000.000/0000-00"
        : kind==="tel"  ? (d.length>10 ? "(00) 00000-0000" : "(00) 0000-0000")
        : null;
  if(!m) return v;
  let out="", i=0;
  for(const ch of m){ if(i>=d.length) break; out += (ch==="0" ? d[i++] : ch); }
  return out;
}
function getF(id){ return DB.funcionarios.find(f=>f.id===id); }
function getProj(id){ return DB.projetos.find(p=>p.id===id); }
function getCli(id){ return DB.clientes.find(c=>c.id===id); }
function projClientes(p){ const ids = (p.clientes&&p.clientes.length)?p.clientes:(p.clienteId?[p.clienteId]:[]); return ids.map(getCli).filter(Boolean); }
function projClientesNome(p){ const c=projClientes(p); return c.length?c.map(x=>x.nome).join(", "):""; }
function salarioDe(f){ const c=DB.cargos.find(c=>c.cargo===f.cargo && String(c.nivel||"")===String(f.nivel||"")); return c?c.salario:null; }
function docStatus(d){
  if(!d.validade) return "";
  const dias = Math.floor((new Date(d.validade+"T12:00") - new Date())/86400000);
  if(dias<0) return `<span class="badge b-bad">vencido</span>`;
  if(dias<=30) return `<span class="badge b-warn">vence em ${dias}d</span>`;
  return `<span class="badge b-ok">válido</span>`;
}

function paintLogo(){

    el.style.background = "#fff";

/* ---------------- gráficos (SVG puro, sem bibliotecas) ---------------- */
function svgDonut(segs, size){
  size = size||150; const r=size/2, ir=r*0.62, cx=r, cy=r;
  const total = segs.reduce((s,x)=>s+x.value,0);
  let a=-Math.PI/2, paths="";
  if(total>0){
    segs.forEach(s=>{ if(!s.value) return;
      const frac=s.value/total, a2=a+frac*Math.PI*2;
      if(frac>=0.9999){ paths+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="${s.color}"/>`; a=a2; return; }
      const x1=cx+r*Math.cos(a), y1=cy+r*Math.sin(a), x2=cx+r*Math.cos(a2), y2=cy+r*Math.sin(a2);
      const large=(a2-a)>Math.PI?1:0;
      paths+=`<path d="M${cx} ${cy} L${x1.toFixed(2)} ${y1.toFixed(2)} A${r} ${r} 0 ${large} 1 ${x2.toFixed(2)} ${y2.toFixed(2)} Z" fill="${s.color}"/>`;
      a=a2;
    });
  } else { paths=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="var(--gray-soft)"/>`; }
  return `<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}" style="flex:none">${paths}<circle cx="${cx}" cy="${cy}" r="${ir}" fill="#fff"/><text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="central" font-size="${(size*0.24).toFixed(0)}" font-weight="800" fill="#101a30">${total}</text></svg>`;
}
function icsEsc(s){ return String(s||"").replace(/\\/g,"\\\\").replace(/;/g,"\\;").replace(/,/g,"\\,").replace(/\n/g,"\\n"); }
function icsBirthday(f){
  const [ , m, d] = String(f.pessoal.nascimento).slice(0,10).split("-");
  const now = new Date(), yr = now.getFullYear();
  const start = `${yr}${m}${d}`;
  const nx = new Date(yr, +m-1, +d+1);
  const end = `${nx.getFullYear()}${String(nx.getMonth()+1).padStart(2,"0")}${String(nx.getDate()).padStart(2,"0")}`;
  const stamp = now.toISOString().replace(/[-:]/g,"").split(".")[0]+"Z";
  return [
    "BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//RH Livion//PT-BR//","CALSCALE:GREGORIAN","METHOD:PUBLISH",
    "BEGIN:VEVENT","UID:rh-niver-"+f.id+"@livion","DTSTAMP:"+stamp,
    "DTSTART;VALUE=DATE:"+start,"DTEND;VALUE=DATE:"+end,"RRULE:FREQ=YEARLY",
    "SUMMARY:🎂 Aniversário — "+icsEsc(f.nome),
    "DESCRIPTION:"+icsEsc("Aniversário de "+f.nome+(f.cargo?(" — "+f.cargo):"")+" · RH Livion"),
    "BEGIN:VALARM","TRIGGER:-P1D","ACTION:DISPLAY","DESCRIPTION:Aniversário amanhã","END:VALARM",
    "END:VEVENT","END:VCALENDAR"
  ].join("\r\n");
}

function openForm(title, fields, values, onSave){
  const ov = document.createElement("div"); ov.className="overlay";
  ov.innerHTML = `<div class="modal"><h3>${esc(title)}</h3><div class="fgrid">
    ${fields.map(f=>{
      const v = values[f.k] ?? "";
      let inp = "";
      if(f.type==="select") inp = `<select id="ff_${f.k}">${(f.opts||[]).map(o=>{const[val,lab]=Array.isArray(o)?o:[o,o];return `<option value="${esc(val)}" ${String(v)===String(val)?"selected":""}>${esc(lab)}</option>`;}).join("")}</select>`;
      else if(f.type==="multiselect"){ const vals=(Array.isArray(v)?v:[]).map(String);
        inp = `<div id="ff_${f.k}" class="colpick" style="border:1.5px solid var(--line);border-radius:11px;padding:10px;gap:6px 14px">${(f.opts||[]).map(o=>{const[val,lab]=Array.isArray(o)?o:[o,o];return `<label class="chip" style="cursor:pointer"><input type="checkbox" value="${esc(val)}" ${vals.includes(String(val))?"checked":""}>${esc(lab)}</label>`;}).join("")||`<span style="color:var(--mut);font-size:.85rem">Nenhuma opção cadastrada</span>`}</div>`; }
      else if(f.type==="textarea") inp = `<textarea id="ff_${f.k}">${esc(v)}</textarea>`;
      else if(f.type==="file") inp = `<input type="file" id="ff_${f.k}" ${f.accept?`accept="${f.accept}"`:""}>`;
      else inp = `<input type="${f.type||"text"}" id="ff_${f.k}" value="${esc(v)}" ${f.mask?`data-mask="${f.mask}"`:""} ${f.ph?`placeholder="${esc(f.ph)}"`:""}>`;
      return `<div class="fld ${f.full||f.type==="textarea"?"full":""}"><label>${esc(f.label)}${f.req?" *":""}</label>${inp}</div>`;
    }).join("")}
  </div><div class="acts"><button class="btn ghost" data-x>Cancelar</button><button class="btn" data-ok>Salvar</button></div></div>`;
  document.body.appendChild(ov);
  ov.addEventListener("click", e=>{ if(e.target===ov) ov.remove(); });
  ov.querySelector("[data-x]").onclick = ()=>ov.remove();
  ov.querySelector("[data-ok]").onclick = async ()=>{
    const out = {};
    for(const f of fields){
      const el = ov.querySelector("#ff_"+f.k);
      if(f.type==="multiselect") out[f.k] = [...el.querySelectorAll("input:checked")].map(i=>i.value);
      else out[f.k] = f.type==="file" ? (el.files[0]||null) : (el.value.trim()||null);
      if(f.req && (f.type==="multiselect" ? !out[f.k].length : !out[f.k])){ toast("Preencha: "+f.label); return; }
    }
    ov.querySelector("[data-ok]").disabled = true;
    const ok = await onSave(out);
    if(ok!==false){ ov.remove(); render(); }
    else ov.querySelector("[data-ok]").disabled = false;
  };
  ov.addEventListener("input", e=>{ const k = e.target.dataset ? e.target.dataset.mask : ""; if(k) e.target.value = fmtMask(e.target.value, k); });
  return ov;
}
function confirmar(msg, fn){
  const ov = document.createElement("div"); ov.className="overlay";
  ov.innerHTML = `<div class="modal"><h3>Confirmar</h3><p style="color:var(--mut);font-size:.92rem">${esc(msg)}</p>
  <div class="acts"><button class="btn ghost" data-x>Cancelar</button><button class="btn danger" data-ok>Excluir</button></div></div>`;
  document.body.appendChild(ov);
  ov.addEventListener("click", e=>{ if(e.target===ov) ov.remove(); });
  ov.querySelector("[data-x]").onclick = ()=>ov.remove();
  ov.querySelector("[data-ok]").onclick = async ()=>{ ov.remove(); await fn(); render(); };
}

function resizeImg(file, max, q, mime){
  mime = mime || "image/jpeg";
  return new Promise((res,rej)=>{
    const img = new Image();
    img.onload = ()=>{
      let {width:w, height:h} = img;
      if(Math.max(w,h)>max){ const r=max/Math.max(w,h); w=Math.round(w*r); h=Math.round(h*r); }
      const c = document.createElement("canvas"); c.width=w; c.height=h;
      const ctx = c.getContext("2d");
      // PNG preserva transparência (fundo transparente); JPEG recebe fundo branco
      if(mime==="image/jpeg"){ ctx.fillStyle="#fff"; ctx.fillRect(0,0,w,h); }
      ctx.drawImage(img,0,0,w,h);
      c.toBlob(b=>b?res(b):rej(new Error("Falha ao processar imagem")), mime, q);
    };
    img.onerror = ()=>rej(new Error("Imagem inválida"));
    img.src = URL.createObjectURL(file);
  });
}

A.alocarNoProj = pid=>{
  const proj = getProj(pid);
  const all = DB.funcionarios;
  const jaNoProj = new Set(all.filter(f=>f.projetos.some(a=>a.projetoId===pid&&!a.fim)).map(f=>f.id));
  const cargos = [...new Set(all.map(f=>f.cargo).filter(Boolean))].sort();
  const checked = new Set(jaNoProj);              // começa com quem já está no projeto
  const F = { status:"Ativo", cargo:"", proj:"", q:"" };
  const projNome = id => getProj(id)?.nome || "";
  const filtrar = ()=>{
    const q = F.q.toLowerCase();
    return all.filter(f=>{
      const ja = jaNoProj.has(f.id);
      if(q && !(f.nome+" "+(f.cargo||"")+" "+f.id).toLowerCase().includes(q)) return false;
      if(ja) return true;                         // membros atuais sempre aparecem (para poder remover)
      if(F.status!=="Todos" && f.status!==F.status) return false;
      if(F.cargo && f.cargo!==F.cargo) return false;
      if(F.proj && !f.projetos.some(a=>a.projetoId===F.proj && !a.fim)) return false;
      return true;
    }).sort((a,b)=>{
      const ja = (jaNoProj.has(b.id)?1:0)-(jaNoProj.has(a.id)?1:0);  // já no projeto primeiro
      return ja || a.nome.localeCompare(b.nome);
    });
  };
  const rowsHtml = ()=>{
    const list = filtrar();
    if(!list.length) return `<div class="empty">Ninguém encontrado com esses filtros</div>`;
    return list.map(f=>{
      const ja = jaNoProj.has(f.id);
      const projs = f.projetos.filter(a=>!a.fim).map(a=>projNome(a.projetoId)).filter(Boolean);
      return `<label class="check" style="align-items:flex-start"><input type="checkbox" value="${f.id}" ${checked.has(f.id)?"checked":""} style="margin-top:3px">
        <div style="flex:1;min-width:0"><b>${esc(f.nome)}</b>
          <div style="color:var(--mut);font-size:.72rem">${esc(f.cargo||"—")}${projs.length?` · 📁 ${esc(projs.join(", "))}`:""}</div></div>
        ${ja?'<span class="badge b-ok" style="flex:none">no projeto</span>':sBadge(f.status)}</label>`;
    }).join("");
  };
  const ov = document.createElement("div"); ov.className="overlay";
  ov.innerHTML = `<div class="modal"><h3>Equipe de ${esc(proj?.nome||"projeto")}</h3>
    <div class="sub" style="margin:-6px 0 12px">Marque para incluir · desmarque para remover do projeto</div>
    <div class="search" style="margin-bottom:10px">${ICONS.search}<input id="al_q" placeholder="Buscar por nome, cargo…"></div>
    <div class="selrow">
      <select id="al_status">${["Ativo","Todos","Candidato","Demitido","Pediu Demissão"].map(s=>`<option ${s==="Ativo"?"selected":""} value="${s}">${s==="Todos"?"Status: todos":s}</option>`).join("")}</select>
      <select id="al_cargo"><option value="">Cargo: todos</option>${cargos.map(c=>`<option value="${esc(c)}">${esc(c)}</option>`).join("")}</select>
      <select id="al_proj"><option value="">Projeto: qualquer</option>${DB.projetos.map(p=>`<option value="${p.id}">${esc(p.nome)}</option>`).join("")}</select>
    </div>
    <div id="al_lista" style="max-height:34dvh;overflow:auto;border:1.5px solid var(--line);border-radius:11px;padding:2px 10px;margin-top:4px">${rowsHtml()}</div>
    <div class="fgrid" style="margin-top:12px">
      <div class="fld"><label>Função (para os novos)</label><input id="al_funcao"></div>
      <div class="fld"><label>Início (para os novos)</label><input type="date" id="al_inicio"></div>
    </div>
    <div class="acts"><button class="btn ghost" data-x>Cancelar</button><button class="btn" data-ok>Salvar equipe</button></div></div>`;
  document.body.appendChild(ov);
  const listEl = ov.querySelector("#al_lista");
  const redraw = ()=>{ listEl.innerHTML = rowsHtml(); };
  ov.addEventListener("click", e=>{ if(e.target===ov) ov.remove(); });
  ov.querySelector("[data-x]").onclick = ()=>ov.remove();
  listEl.addEventListener("change", e=>{ const cb=e.target; if(!cb.value) return; if(cb.checked) checked.add(cb.value); else checked.delete(cb.value); });
  ov.querySelector("#al_q").addEventListener("input", e=>{ F.q=e.target.value; redraw(); });
  ov.querySelector("#al_status").addEventListener("change", e=>{ F.status=e.target.value; redraw(); });
  ov.querySelector("#al_cargo").addEventListener("change", e=>{ F.cargo=e.target.value; redraw(); });
  ov.querySelector("#al_proj").addEventListener("change", e=>{ F.proj=e.target.value; redraw(); });
  ov.querySelector("[data-ok]").onclick = async ()=>{
    const toAdd = [...checked].filter(id=>!jaNoProj.has(id));
    const toRemove = [...jaNoProj].filter(id=>!checked.has(id));
    if(!toAdd.length && !toRemove.length){ toast("Nada alterado"); return; }
    const funcao = ov.querySelector("#al_funcao").value.trim()||null;
    const inicio = ov.querySelector("#al_inicio").value||null;
    toAdd.forEach(id=>{ const f=getF(id); f.projetos.push({projetoId:pid, funcao, cargo:f.cargo, inicio, fim:null, observacoes:null}); });
    toRemove.forEach(id=>{ const f=getF(id); f.projetos = f.projetos.filter(a=>!(a.projetoId===pid && !a.fim)); });
    if(await saveDB()){ ov.remove(); toast(`✅ Equipe atualizada (+${toAdd.length} / −${toRemove.length})`); render(); }
  };
};

/* ---------------- normalização de dados (migra estruturas antigas) ---------------- */
function normalizeDB(){
  if(!Array.isArray(DB.empresas)) DB.empresas = [...new Set(DB.funcionarios.map(f=>f.empresa).filter(Boolean))].sort();
  DB.funcionarios.forEach(f=>{
    const p = f.pessoal || (f.pessoal = {});
    if(!Array.isArray(p.dependentes)){
      p.dependentes = [];
      if(p.filhos || p.idadesFilhos) p.dependentes.push({parentesco:"Filho(a)", nome:null, idade:p.idadesFilhos||null});
    }
    if(!Array.isArray(p.emergencias)){
      p.emergencias = p.emergenciaNome ? [{nome:p.emergenciaNome, telefone:p.emergenciaTelefone||null, parentesco:p.emergenciaParentesco||null}] : [];
    }
    if(!p.saude){
      p.saude = {doencas:[], medicamentos:[], alergias:[]};
      if(p.qualDoenca) p.saude.doencas.push(p.qualDoenca);
      if(p.quaisMedicamentos) p.saude.medicamentos.push(p.quaisMedicamentos);
      if(p.tiposAlergias) p.saude.alergias.push(p.tiposAlergias);
    }
  });
  DB.projetos.forEach(p=>{
    if(p.icone===undefined || p.icone===null) p.icone="📌";
    if(p.local===undefined) p.local=null;
    // múltiplos locais por projeto (migra o campo antigo "local")
    if(!Array.isArray(p.locais)){
      p.locais = p.local ? [p.local] : [];
    }
    // múltiplos clientes por projeto (migra o campo antigo "clienteId")
    if(!Array.isArray(p.clientes)){
      p.clientes = p.clienteId ? [p.clienteId] : [];
    }
  });
  // catálogo de cargos (permite cargos sem nível ainda) + observação por cargo
  if(!Array.isArray(DB.cargosMeta)) DB.cargosMeta = [];
  const nomesExistentes = new Set(DB.cargosMeta.map(c=>c.nome));
  [...new Set(DB.cargos.map(c=>c.cargo).filter(Boolean))].forEach(nome=>{
    if(!nomesExistentes.has(nome)){ DB.cargosMeta.push({nome, observacao:null}); nomesExistentes.add(nome); }
  });
  // regras de salário: identifica o salário mínimo base e recalcula regras vinculadas
  const baseMin = DB.regrasSalario.find(r=>r.ehSalarioMinimo) || DB.regrasSalario.find(r=>/m[íi]nimo atual/i.test(r.descricao||""));
  if(baseMin) baseMin.ehSalarioMinimo = true;
  DB.regrasSalario.forEach(r=>{
    // regra GRUPORH histórica passa a calcular pelo % sobre o salário mínimo
    if(r.baseRef===undefined){
      if(/gruporh/i.test(r.descricao||"") && r.aumento!=null){ r.baseRef="minimo"; r.percentual = Math.round(r.aumento*100); }
      else r.baseRef=null;
    }
  });
  recalcRegras();
}
/* recalcula salários das regras vinculadas ao salário mínimo */
function recalcRegras(){
  if(!Array.isArray(DB.regrasSalario)) return;
  const base = DB.regrasSalario.find(r=>r.ehSalarioMinimo);
  if(!base) return;
  DB.regrasSalario.forEach(r=>{
    if(r.baseRef==="minimo" && r.percentual!=null){
      r.salario = Math.round(Number(base.salario||0) * (1 + Number(r.percentual)/100) * 100) / 100;
    }
  });
}

/* ---------------- mapa da equipe (Leaflet + OpenStreetMap) ---------------- */
let MAP = null, lastGeo = 0;
async function ensureLeaflet(){
  if(window.L) return;
  if(!document.getElementById("lfcss")){
    const l = document.createElement("link"); l.id="lfcss"; l.rel="stylesheet";
    l.href = "https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css";
    l.onerror = ()=>{ l.onerror=null; l.href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"; };
    document.head.appendChild(l);
  }
  await loadScript([
    "https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js",
    "https://unpkg.com/leaflet@1.9.4/dist/leaflet.js",
    "https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"
  ]);
}
function geoCache(){ try{ return JSON.parse(localStorage.getItem("rh_geo")||"{}"); }catch(e){ return {}; } }
function geoSet(q, v){ try{ const c=geoCache(); c[q]=v; localStorage.setItem("rh_geo", JSON.stringify(c)); }catch(e){} }
/* uma consulta ao Nominatim (respeita 1 req/s) */
async function geoQuery(q){
  const wait = Math.max(0, lastGeo + 1100 - Date.now());
  if(wait) await new Promise(r=>setTimeout(r, wait));
  lastGeo = Date.now();
  try{
    const r = await fetch("https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=br&accept-language=pt-BR&q="+encodeURIComponent(q));
    if(!r.ok) return null;
    const j = await r.json();
    return j[0] ? [+j[0].lat, +j[0].lon] : null;
  }catch(e){ return null; }
}
/* gera variações do endereço, da mais específica para a mais genérica */
function geoVariants(q){
  const raw = String(q||"").trim();
  const out = [];
  const add = s=>{ s=s.replace(/\s{2,}/g," ").trim(); if(s && !out.includes(s)) out.push(s); };
  add(/brasil/i.test(raw) ? raw : raw+", Brasil");
  // remove número da porta inicial e ruídos como "Nº:", "Ap"
  const parts = raw.split(",").map(s=>s.trim()).filter(Boolean);
  if(parts.length>=2){
    // últimas 3, 2 e 1 partes (bairro/cidade/UF) — mais fáceis de localizar
    for(const n of [3,2,1]){
      if(parts.length>=n){ add(parts.slice(-n).join(", ")+", Brasil"); }
    }
  }
  return out;
}
async function geocode(q){
  if(!q) return null;
  const c = geoCache();
  if(q in c && c[q]) return c[q];       // usa só acertos em cache
  for(const variant of geoVariants(q)){
    const v = await geoQuery(variant);
    if(v){ geoSet(q, v); return v; }
  }
  // não encontrou em nenhuma variação — não guarda null para poder tentar de novo depois
  return null;
}

      pts.push(g);

    if(st) st.textContent = "Localizando: "+f.nome+"…";
    const g = await geocode(end);
    if(!g){ sem++; continue; }
    L.marker(g,{icon:L.divIcon({className:"", html:`<div style="width:34px;height:34px;border-radius:50%;background:#1b3a6b;color:#fff;display:grid;place-items:center;font-weight:700;font-size:.7rem;border:2.5px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.4)">${initials(f.nome)}</div>`, iconSize:[34,34], iconAnchor:[17,17]})}).addTo(MAP)

    pts.push(g);
  }
  if(st) st.textContent = pts.length ? `${pts.length} ponto(s) no mapa${sem?` · ${sem} funcionário(s) sem endereço localizável`:""}${semProj?` · ${semProj} local(is) de projeto não localizado(s)`:""}` : "Nenhum ponto localizável — preencha o Endereço no cadastro pessoal e os Locais dos projetos (ex.: cidade, UF).";
  if(pts.length && document.body.contains(el)) MAP.fitBounds(pts, {padding:[40,40], maxZoom:11});
}

/* ---------------- empresas contratantes ---------------- */
A.gerirEmpresas = ()=>{
  const ov = document.createElement("div"); ov.className="overlay";
  const lista = ()=> DB.empresas.map((e,i)=>`<div class="rowitem"><div class="inf"><b>${esc(e)}</b><span>${DB.funcionarios.filter(f=>f.empresa===e).length} funcionário(s)</span></div>
    <button class="iconbtn" data-del="${i}">${ICONS.del}</button></div>`).join("") || `<div class="empty">Nenhuma empresa cadastrada</div>`;
  ov.innerHTML = `<div class="modal"><h3>Empresas contratantes</h3>
    <div id="emp_lista">${lista()}</div>
    <div style="display:flex;gap:8px;margin-top:14px">
      <input id="emp_nova" placeholder="Nome da nova empresa…" style="flex:1;border:1.5px solid var(--line);border-radius:11px;padding:11px 12px;font-size:.95rem">
      <button class="btn" data-add>${ICONS.plus} Adicionar</button></div>
    <div class="acts"><button class="btn ghost" data-x>Fechar</button></div></div>`;
  document.body.appendChild(ov);
  ov.addEventListener("click", async e=>{
    if(e.target===ov){ ov.remove(); return; }
    const del = e.target.closest("[data-del]");
    if(del){
      const i = +del.getAttribute("data-del");
      const emp = DB.empresas[i];
      const n = DB.funcionarios.filter(f=>f.empresa===emp).length;
      if(confirm(`Excluir "${emp}"?${n?` ${n} funcionário(s) continuarão com esse nome no cadastro.`:""}`)){
        DB.empresas.splice(i,1);
        if(await saveDB()){ ov.querySelector("#emp_lista").innerHTML = lista(); toast("✅ Excluída"); }
      }
    }
  });
  ov.querySelector("[data-x]").onclick = ()=>ov.remove();
  ov.querySelector("[data-add]").onclick = async ()=>{
    const v = ov.querySelector("#emp_nova").value.trim();
    if(!v){ toast("Digite o nome da empresa"); return; }
    if(DB.empresas.includes(v)){ toast("Essa empresa já existe"); return; }
    DB.empresas.push(v); DB.empresas.sort();
    if(await saveDB()){ ov.querySelector("#emp_lista").innerHTML = lista(); ov.querySelector("#emp_nova").value=""; toast("✅ Adicionada"); }
  };
};

window.go = go; window.A = A;
boot();
</script>
